<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>단위 환산기</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            /* 상단에 너무 붙지 않게 약간의 여백만 줌 */
            padding-top: 50px; 
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }

        h2 {
            text-align: center;
            color: #222;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 1.6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .input-box {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #444;
            padding-left: 5px;
        }

        input {
            width: 100%;
            padding: 18px;
            font-size: 1.4rem; /* 숫자를 더 잘 보이게 키움 */
            border: 2px solid #e9ecef;
            border-radius: 15px;
            outline: none;
            background-color: #fdfdfd;
            transition: 0.2s;
        }

        input:focus {
            border-color: #4dabf7;
            background-color: #fff;
        }

        .divider {
            text-align: center;
            font-size: 1.5rem;
            color: #adb5bd;
            margin: 10px 0;
        }

        .btn-reset {
            width: 100%;
            padding: 18px;
            background-color: #495057;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

        .footer-note {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            color: #868e96;
            background: #f1f3f5;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📏 단위 환산기</h2>

    <div class="input-box">
        <label>밀리미터 (mm)</label>
        <input type="number" id="mm" placeholder="값을 입력하세요" oninput="calc('mm')">
    </div>

    <div class="divider">⇅</div>

    <div class="input-box">
        <label>미터 (m)</label>
        <input type="number" id="meter" placeholder="값을 입력하세요" oninput="calc('m')">
    </div>

    <button class="btn-reset" onclick="clearAll()">전체 초기화</button>

    <div class="footer-note">
        <strong>1,000mm = 1m</strong><br>
        숫자를 입력하면 자동으로 계산됩니다.
    </div>
</div>

<script>
    function calc(type) {
        const mmEl = document.getElementById('mm');
        const mEl = document.getElementById('meter');

        if (type === 'mm') {
            const val = mmEl.value;
            mEl.value = val ? (parseFloat(val) / 1000) : "";
        } else {
            const val = mEl.value;
            mmEl.value = val ? (parseFloat(val) * 1000) : "";
        }
    }

    function clearAll() {
        document.getElementById('mm').value = "";
        document.getElementById('meter').value = "";
    }
</script>

</body>
</html>
